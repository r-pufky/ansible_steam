---
###############################################################################
# Feature Flags
###############################################################################

# 1. Is this role applied to a container?
#
# Decision: manual user setting - There is currently no good way to
#     deterministically and consistently detect if a remote host is a
#     container outside of common cases.
#
# Hosts marked as containers will automatically disable:
#   * steam_flg_cdn
#
# Special Case:
#   * deb_flg_container=true forces steam_flg_container=true.
#
# Default: False.
steam_flg_container: false

# 2. Force Static IP for client-download.steampowered.com?
#
# client-download.steampowered.com is used for internet connectivity checks and
# to download data. CDN DNS updates may break this for up to 72 hours. steamcmd
# will fail with 'Please confirm your network connection and try again.'.
#
# Enabling resolves media.steampowered.com and statically sets /etc/hosts which
# fix this specific issue. Requires steam_flg_container=false.
#
# This should ONLY be used as a one-off and not set by default as changing IP's
# will result in steamcmd breaking again in the future.
#
# Reference:
# * https://r-pufky.github.io/docs/game/steam/troubleshooting
steam_flg_cdn: false

# 3. Automatically add Debian APT sources?
#
# Additional APT components (contrib, non-free, non-free-firmware) are required
# for Steam installation. winehq sources are installed if steam_flg_wine=true.
# Original sources.list is disabled.
#
# Alternatively all sources must be manually added outside of this role.
#
# Default: True.
steam_flg_apt_sources: true

# 4. Force steamcmd/wine updates if already installed? Default: False.
steam_flg_update: false

# 5. Enable Metamod installation?
#
# Install size: ~5MB
#
# Metamod will be downloaded to /opt/metamod. Specific games must manually
# install Metamod based on game requirements and locations.
#
# Default: False.
steam_flg_metamod: false

# 6. Enable Sourcemod installation?
#
# Install size: ~200MB
#
# Enabling will automatically enable Metamod as a dependency. Sourcemod will be
# downloaded to /opt/sourcemod. Specific games must manually install Sourcemod
# based on game requirements and locations.
#
# Default: False.
steam_flg_sourcemod: false

# 7. Install wine/winetricks (windows support)?
#
# Install size: ~2GB
#
# Default: False.
steam_flg_wine: false

###############################################################################
# Service
###############################################################################

# Github access token.
#
# Unauthenticated (anonymous) API requests are heavily restricted to the sum
# total of requests to github from a given IP. Use an access token if
# receiving 403's.
#
# Classic Tokens:
# * settings > developer settings > personal access tokens (classic)
#   * notes: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * scopes: NONE
#
# Fine-grained Tokens:
# * settings > developer settings > personal access tokens (fine-grained)
#   * token name: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * description: {DESCRIPTIVE TEXT}
#   * resource owner: {YOUR ACCOUNT}
#   * repository access: Public Repositories (read-only)
#
# Default: '' (unauthenticated).
#
# Reference:
# * https://docs.github.com/en/authentication
steam_srv_token: ''

# Enable raw network access?
#
# Allows applications that need to send and receive raw IP packets to do so in
# wine. Disabled by default because it carries a potential security risk. Only
# enable if wine application requires it.
#
# Default: False.
steam_srv_raw_network: false

# User that Steam will run under.
#
# 'steam' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Standard steam locations:
# * ~/.steam/steam -> ~/.local/share/Steam.
# * ~/.steam/root -> ~/.local/share/Steam.
# * ~/.local/share - steam/game state information (saves, user profiles).
#
# Default: 'navidrome'.
steam_srv_user: 'steam'

# Group that Steam will run under.
#
# 'steam' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'navidrome'.
steam_srv_group: 'steam'

###############################################################################
# Config
###############################################################################

# Meta/Source Mod
###############################################################################
# Metamod and Sourcemod required matched branches to work correctly together.
#
# Reference:
# * https://www.sourcemm.net/downloads.php/?branch=stable
# * https://www.sourcemod.net/downloads.php?branch=stable

# Mod branch. Default: '1.12.0'.
steam_cfg_mod_branch: '1.12.0'

# Metamod build. Default: '1221'.
steam_cfg_mm_build: '1221'

# Sourcemod build. Default: '7228'.
steam_cfg_sm_build: '7228'

# Wine/Winetricks
###############################################################################
# Wine and Winetricks are always installed together.
#
# Reference:
# * https://github.com/Winetricks/winetricks/releases

# Wine release.
#
# Values:
#    stable: Annual release - for most games (default).
#   staging: Pre-annual release with experimental patches - typically contains
#            patches for recent releases. Use only if 'stable' does not work.
#     devel: Bi-weekly release of development head - bleeding edge. Not
#            recommended.
#
# Default: 'stable'.
steam_cfg_wine_branch: 'stable'

# Winetricks release.
#
# Always read release notes before updating versions. Role is only developed
# for LTS releases.
#
# Default: '20260125'.
#
steam_cfg_wine_tricks: '20260125'
